<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notizen</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body>
    <h1>Task Manager</h1>

    <div>
        <input type="text" id="noteTitleInput" placeholder="Neue Notiz..." />
    </div>
    
    <div>
        <textarea id="noteTextInput" cols="30" rows="5"></textarea>
    </div>

    <button id="addNoteButton">Hinzufügen</button>

    <div id="noteList"></div>

    <template id="noteTemplate">
        <article>
            <h3 class="noteTitle"></h3>
            <p class="noteText"></p>
            <button class="delete">Löschen</button>
        </article>
    </template>

    <script src="script.js"></script>
</body>
</html>
